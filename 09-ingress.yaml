# Now bound to a real, stable domain (DuckDNS-backed, points at the GCP
# VM's static-enough external IP) instead of matching any Host header - that
# looser setup was for the earlier Cloudflare quick-tunnel days, when the
# hostname was random and changed every restart. cert-manager's
# ingress-shim watches for the tls block below and the cluster-issuer
# annotation, and automatically requests/renews a real Let's Encrypt cert
# via HTTP-01 (which needs port 80 reachable at this exact host - already
# true, see the firewall rule in README.md).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: ai-task-platform
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "false"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mernstackwebapptasneem.duckdns.org
      secretName: app-tls
  rules:
    - host: mernstackwebapptasneem.duckdns.org
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
