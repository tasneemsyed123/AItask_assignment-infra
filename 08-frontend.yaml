apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-task-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Built with --build-arg NEXT_PUBLIC_API_BASE_URL=/api/v1 (a
          # RELATIVE path) - distinct from the docker-compose image, which
          # bakes in an absolute http://localhost:4000/api/v1. NEXT_PUBLIC_*
          # values are inlined into the client bundle at build time, and the
          # browser reaching this app through the Ingress/tunnel needs to
          # call the backend at whatever host it's currently on - a
          # relative path resolves correctly regardless of whether that's
          # the minikube IP, a port-forward, or the ephemeral
          # *.trycloudflare.com tunnel URL (which changes every run). See
          # k8s/README.md for the exact build command.
          image: tasneemsyed/ai-task-platform-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 192Mi
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ai-task-platform
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
