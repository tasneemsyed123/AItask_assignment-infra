apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-task-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: tasneemsyed/ai-task-platform-backend:e9ecf42
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef: { name: app-config }
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: app-secret, key: JWT_SECRET } }
            - name: GMAIL_USER
              valueFrom: { secretKeyRef: { name: app-secret, key: GMAIL_USER } }
            - name: GMAIL_APP_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secret, key: GMAIL_APP_PASSWORD } }
            # Composite connection strings, built from the same pieces the
            # Mongo/Redis manifests use, pointed at their in-cluster Service
            # DNS names rather than localhost - mirrors the same
            # env_file + environment override pattern docker-compose.yml
            # uses for the same reason (see that file's comments).
            - name: MONGO_APP_USER
              valueFrom: { secretKeyRef: { name: app-secret, key: MONGO_APP_USER } }
            - name: MONGO_APP_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secret, key: MONGO_APP_PASSWORD } }
            - name: MONGO_URI
              value: "mongodb://$(MONGO_APP_USER):$(MONGO_APP_PASSWORD)@mongo:27017/ai_task_platform?authSource=ai_task_platform"
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secret, key: REDIS_PASSWORD } }
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet: { path: /api/health/live, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /api/health/ready, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-task-platform
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
