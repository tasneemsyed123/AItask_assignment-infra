# Template only - safe to commit. Copy to 02-secret.yaml (gitignored, see
# k8s/.gitignore) and fill in real values before applying, exactly the same
# pattern as backend/.env vs backend/.env.example. Never put real secrets in
# THIS file.
#
# Generate strong values the same way as everywhere else in this project:
#   node -e "console.log(require('crypto').randomBytes(24).toString('hex'))"
#
# `stringData` (not `data`) is used here deliberately - kubectl base64-encodes
# it for you on apply, so this file holds plain values like every other .env*
# file in the repo instead of pre-encoded base64 (which is NOT encryption,
# just an encoding - a base64 secret manifest committed to git is exactly as
# exposed as a plaintext one).
#
# metadata.name is deliberately NOT app-secret. This file previously shared
# that name, and because it's a valid Secret manifest sitting in the same
# directory ArgoCD's Application watches, ArgoCD's selfHeal periodically
# re-applied THIS placeholder version over the real, manually-applied
# app-secret - silently reverting JWT_SECRET/DB passwords/Gmail creds back
# to junk on every sync. The Application's source.directory.exclude also
# skips this file now (belt and suspenders - don't remove either fix).
apiVersion: v1
kind: Secret
metadata:
  name: app-secret-EXAMPLE-DO-NOT-APPLY
  namespace: ai-task-platform
type: Opaque
stringData:
  JWT_SECRET: "replace_with_a_long_random_string"
  MONGO_ROOT_USER: "admin"
  MONGO_ROOT_PASSWORD: "replace_with_a_long_random_string"
  MONGO_APP_USER: "ai_task_platform_app"
  MONGO_APP_PASSWORD: "replace_with_a_long_random_string"
  REDIS_PASSWORD: "replace_with_a_long_random_string"
  # Optional - forgot/reset-password email just logs a warning and no-ops
  # without these, same as in local dev (see utils/mailer.ts).
  GMAIL_USER: ""
  GMAIL_APP_PASSWORD: ""
